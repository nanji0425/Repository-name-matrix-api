# MatrixAPI - New API based production deployment
# Server: 47.82.105.81
#
version: '3.8'

services:
  new-api:
    build:
      context: ./output/new-api-src
      dockerfile: Dockerfile
    image: matrixapi-new-api:v1.0.0-rc.18
    container_name: matrixapi-new-api
    restart: unless-stopped
    command: --log-dir /app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SQL_DSN: "postgresql://matrixapi:${DB_PASSWORD}@postgres:5432/new_api"
      REDIS_CONN_STRING: "redis://:${REDIS_PASSWORD}@redis:6379"
      SESSION_SECRET: ${SESSION_SECRET}
      CRYPTO_SECRET: ${CRYPTO_SECRET}
      ERROR_LOG_ENABLED: "true"
      BATCH_UPDATE_ENABLED: "true"
      NODE_NAME: matrixapi-hk-1
      STREAMING_TIMEOUT: ${STREAMING_TIMEOUT:-300}
      STREAM_SCANNER_MAX_BUFFER_MB: ${STREAM_SCANNER_MAX_BUFFER_MB:-64}
      MAX_REQUEST_BODY_MB: ${MAX_REQUEST_BODY_MB:-64}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SESSION_COOKIE_TRUSTED_URL: ${SESSION_COOKIE_TRUSTED_URL:-https://matrixapi.online,https://www.matrixapi.online}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - new_api_data:/data
      - new_api_logs:/app/logs
    networks:
      - matrixapi-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -q '\"success\":[[:space:]]*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: matrixapi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: matrixapi
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: new_api
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - new_api_postgres_data:/var/lib/postgresql/data
    networks:
      - matrixapi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matrixapi -d new_api"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: matrixapi-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - new_api_redis_data:/data
    networks:
      - matrixapi-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: matrixapi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/site:/usr/share/nginx/matrix-site:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /var/www/certbot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - new-api
    networks:
      - matrixapi-network

networks:
  matrixapi-network:
    driver: bridge

volumes:
  new_api_data:
  new_api_logs:
  new_api_postgres_data:
  new_api_redis_data:

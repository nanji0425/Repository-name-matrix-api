events {
  worker_connections 1024;
  multi_accept on;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  keepalive_timeout 65;
  client_max_body_size 100M;

  # Logging
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=gateway:10m rate=60r/s;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  # Backend API upstream
  upstream backend {
    server backend:3000 max_fails=3 fail_timeout=10s;
  }

  # Frontend upstream
  upstream frontend {
    server frontend:3001;
  }

  # Main HTTP fallback. When TLS certificates exist, deploy.sh enables a
  # domain-specific redirect server from nginx/https-redirect.conf.template.
  server {
    listen 80 default_server;
    server_name 47.82.105.81 _;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ZPay callbacks must be publicly reachable and should not be rate-limited like user APIs.
    location = /api/wallet/zpay/notify {
      proxy_pass http://backend/api/wallet/zpay/notify;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    # API Gateway (backend routes)
    location /api/ {
      proxy_pass http://backend/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;

      # Rate limiting
      limit_req zone=api burst=20 nodelay;
    }

    # OpenAI Compatible Endpoints (with streaming support)
    location /v1/ {
      proxy_pass http://backend/v1/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 300s;
      proxy_http_version 1.1;
      proxy_set_header Connection '';

      limit_req zone=gateway burst=40 nodelay;
    }

    # Swagger Docs
    location /api/docs {
      proxy_pass http://backend/api/docs;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Frontend (all other routes)
    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }
  }

  include /etc/nginx/conf.d/*.conf;
}

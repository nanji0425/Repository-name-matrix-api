worker_processes auto;

events {
  worker_connections 1024;
  multi_accept on;
}
http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      off;
  tcp_nopush    off;
  tcp_nodelay   on;
  keepalive_timeout 65;
  client_max_body_size 100M;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  limit_req_zone $binary_remote_addr zone=api:10m rate=180r/s;
  limit_req_zone $binary_remote_addr zone=gateway:10m rate=120r/s;
  proxy_cache_path /var/cache/nginx/matrix-static levels=1:2 keys_zone=matrix_static:20m max_size=256m inactive=1h use_temp_path=off;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_min_length 1024;
  gzip_http_version 1.1;
  gzip_comp_level 2;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  upstream new_api {
    server new-api:3000 max_fails=3 fail_timeout=10s;
  }

  server {
    listen 80 default_server;
    server_name matrixapi.online www.matrixapi.online 47.82.105.81 _;

    if ($request_uri !~ "^/\.well-known/acme-challenge/") {
      return 301 https://matrixapi.online$request_uri;
    }

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    include /etc/nginx/conf.d/security-headers.inc;

    location ~ /\.(?!well-known/acme-challenge/) {
      return 404;
    }

    location ~* ^/(docker-compose\.yml|PROJECT_[^/]*|AGENTS\.md|ruvector\.db|nginx/|scripts/) {
      return 404;
    }

    location = /售后qq群二维码.jpg {
      return 404;
    }

    location = / {
      proxy_pass http://new_api;
      sub_filter_once on;
      sub_filter '</head>' '<meta name="baidu-site-verification" content="codeva-zfLalJhUJY" /><script src="/matrix-assets/brand-init.js?v=2026071421"></script></head>';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
    }

    location = /robots.txt {
      root /usr/share/nginx/matrix-site;
      try_files /robots.txt =404;
      include /etc/nginx/conf.d/security-headers.inc;
      add_header Cache-Control "public, max-age=3600";
    }

    location = /sitemap.xml {
      root /usr/share/nginx/matrix-site;
      try_files /sitemap.xml =404;
      include /etc/nginx/conf.d/security-headers.inc;
      add_header Cache-Control "public, max-age=3600";
    }

    location = /site.webmanifest {
      root /usr/share/nginx/matrix-site;
      try_files /site.webmanifest =404;
      default_type application/manifest+json;
      include /etc/nginx/conf.d/security-headers.inc;
      add_header Cache-Control "public, max-age=3600";
    }

    location /matrix-assets/ {
      alias /usr/share/nginx/matrix-site/;
      expires 1h;
      include /etc/nginx/conf.d/security-headers.inc;
      add_header Cache-Control "public, max-age=3600";
    }

    location /static/ {
      root /usr/share/nginx/matrix-site;
      gzip_static on;
      try_files $uri @new_api_static;
      expires 7d;
      include /etc/nginx/conf.d/security-headers.inc;
      add_header Cache-Control "public, max-age=604800, immutable";
      add_header X-Matrix-Static "local" always;
    }

    location @new_api_static {
      proxy_pass http://new_api;
      proxy_cache matrix_static;
      proxy_cache_valid 200 302 24h;
      proxy_cache_valid 404 1m;
      proxy_cache_lock on;
      proxy_ignore_headers Cache-Control Expires Set-Cookie;
      proxy_hide_header Cache-Control;
      proxy_hide_header Expires;
      proxy_hide_header Set-Cookie;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
      include /etc/nginx/conf.d/security-headers.inc;
      add_header Cache-Control "public, max-age=604800, immutable";
      add_header X-Matrix-Cache $upstream_cache_status always;
    }

    location = /topup {
      return 302 /wallet;
    }

    location = /topup/ {
      return 302 /wallet;
    }

    location = /pricing {
      proxy_pass http://new_api;
      proxy_set_header Accept-Encoding "";
      sub_filter_once on;
      sub_filter '</head>' '<script src="/matrix-assets/brand-init.js?v=2026071421"></script></head>';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
    }

    location = /pricing/ {
      return 302 /pricing;
    }

    location = /rankings {
      root /usr/share/nginx/matrix-site;
      try_files /rankings.html =404;
    }

    location = /rankings/ {
      root /usr/share/nginx/matrix-site;
      try_files /rankings.html =404;
    }

    location = /ranking {
      return 302 /rankings;
    }

    location = /ranking/ {
      return 302 /rankings;
    }

    location = /user-agreement {
      root /usr/share/nginx/matrix-site;
      try_files /legal.html =404;
    }

    location = /user-agreement/ {
      root /usr/share/nginx/matrix-site;
      try_files /legal.html =404;
    }

    location = /privacy-policy {
      root /usr/share/nginx/matrix-site;
      try_files /legal.html =404;
    }

    location = /privacy-policy/ {
      root /usr/share/nginx/matrix-site;
      try_files /legal.html =404;
    }

    location = /sign-in/ {
      return 302 /sign-in;
    }

    location = /login {
      return 302 /sign-in;
    }

    location = /login/ {
      return 302 /sign-in;
    }

    location = /sign-up/ {
      return 302 /sign-up;
    }

    location = /register {
      return 302 /sign-up;
    }

    location = /register/ {
      return 302 /sign-up;
    }

    location = /forgot-password/ {
      return 302 /forgot-password;
    }

    location = /dashboard {
      return 302 /dashboard/overview;
    }

    location = /dashboard/ {
      return 302 /dashboard/overview;
    }

    location = /dashboard/topup {
      return 302 /wallet;
    }

    location = /dashboard/topup/ {
      return 302 /wallet;
    }

    location = /dashboard/token {
      return 302 /keys;
    }

    location = /dashboard/log {
      return 302 /usage-logs/common;
    }

    location = /dashboard/task {
      return 302 /usage-logs/task;
    }

    location = /dashboard/subscription {
      return 302 /wallet;
    }

    location = /dashboard/personal {
      return 302 /profile;
    }

    location = /dashboard/models {
      return 302 /models/metadata;
    }

    location = /dashboard/channel {
      return 302 /channels;
    }

    location = /dashboard/redemption {
      return 302 /redemption-codes;
    }

    location = /dashboard/setting {
      return 302 /system-settings/site;
    }

    location = /dashboard/user {
      return 302 /users;
    }

    location = /dashboard/deployment {
      return 302 /models/deployments;
    }

    location = /console {
      return 302 /dashboard/overview;
    }

    location = /console/ {
      return 302 /dashboard/overview;
    }

    location = /console/overview {
      return 302 /dashboard/overview;
    }

    location = /console/token {
      return 302 /keys;
    }

    location = /console/log {
      return 302 /usage-logs/common;
    }

    location = /console/task {
      return 302 /usage-logs/task;
    }

    location = /console/topup {
      return 302 /wallet;
    }

    location = /console/subscription {
      return 302 /wallet;
    }

    location = /console/personal {
      return 302 /profile;
    }

    location = /console/models {
      return 302 /models/metadata;
    }

    location = /console/channel {
      return 302 /channels;
    }

    location = /console/redemption {
      return 302 /redemption-codes;
    }

    location = /console/setting {
      return 302 /system-settings/site;
    }

    location = /console/user {
      return 302 /users;
    }

    location = /console/deployment {
      return 302 /models/deployments;
    }

    location /console/ {
      return 302 /dashboard/overview;
    }

    location = /api/user/epay/notify {
      proxy_pass http://new_api/api/user/epay/notify;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    location = /api/subscription/epay/notify {
      proxy_pass http://new_api/api/subscription/epay/notify;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    location /v1/ {
      proxy_pass http://new_api/v1/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 300s;
      proxy_http_version 1.1;
      proxy_set_header Connection '';
      limit_req zone=gateway burst=80 nodelay;
    }

    location /api/ {
      proxy_pass http://new_api/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
      proxy_http_version 1.1;
      limit_req zone=api burst=120 nodelay;
    }

    location / {
      proxy_pass http://new_api;
      proxy_set_header Accept-Encoding "";
      sub_filter_once on;
    sub_filter '</head>' '<script src="/matrix-assets/brand-init.js?v=2026071421"></script></head>';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }

  include /etc/nginx/conf.d/*.conf;
}

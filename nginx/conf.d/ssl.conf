server {
  listen 443 ssl;
  http2 on;
  server_name matrixapi.online www.matrixapi.online;

  ssl_certificate /etc/letsencrypt/live/matrixapi.online/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/matrixapi.online/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  include /etc/nginx/conf.d/security-headers.inc;

  location ~ /\.(?!well-known/acme-challenge/) {
    return 404;
  }

  location ~* ^/(docker-compose(\.legacy)?\.yml|PROJECT_[^/]*|AGENTS\.md|ruvector\.db|nginx/|scripts/) {
    return 404;
  }

  location = /售后qq群二维码.jpg {
    return 404;
  }

  location = / {
    root /usr/share/nginx/matrix-site;
    try_files /index.html =404;
  }

  location = /robots.txt {
    root /usr/share/nginx/matrix-site;
    try_files /robots.txt =404;
    include /etc/nginx/conf.d/security-headers.inc;
    add_header Cache-Control "public, max-age=3600";
  }

  location = /sitemap.xml {
    root /usr/share/nginx/matrix-site;
    try_files /sitemap.xml =404;
    include /etc/nginx/conf.d/security-headers.inc;
    add_header Cache-Control "public, max-age=3600";
  }

  location = /site.webmanifest {
    root /usr/share/nginx/matrix-site;
    try_files /site.webmanifest =404;
    default_type application/manifest+json;
    include /etc/nginx/conf.d/security-headers.inc;
    add_header Cache-Control "public, max-age=3600";
  }

  location /matrix-assets/ {
    alias /usr/share/nginx/matrix-site/;
    expires 1h;
    include /etc/nginx/conf.d/security-headers.inc;
    add_header Cache-Control "public, max-age=3600";
  }

  location /static/ {
    root /usr/share/nginx/matrix-site;
    gzip_static on;
    try_files $uri @new_api_static_ssl;
    expires 7d;
    include /etc/nginx/conf.d/security-headers.inc;
    add_header Cache-Control "public, max-age=604800, immutable";
    add_header X-Matrix-Static "local" always;
  }

  location @new_api_static_ssl {
    proxy_pass http://new_api;
    proxy_cache matrix_static;
    proxy_cache_valid 200 302 24h;
    proxy_cache_valid 404 1m;
    proxy_cache_lock on;
    proxy_ignore_headers Cache-Control Expires Set-Cookie;
    proxy_hide_header Cache-Control;
    proxy_hide_header Expires;
    proxy_hide_header Set-Cookie;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    include /etc/nginx/conf.d/security-headers.inc;
    add_header Cache-Control "public, max-age=604800, immutable";
    add_header X-Matrix-Cache $upstream_cache_status always;
  }

  location = /docs {
    root /usr/share/nginx/matrix-site;
    try_files /docs.html =404;
  }

  location = /docs/ {
    root /usr/share/nginx/matrix-site;
    try_files /docs.html =404;
  }

  location = /wallet {
    root /usr/share/nginx/matrix-site;
    try_files /wallet.html =404;
  }

  location = /wallet/ {
    root /usr/share/nginx/matrix-site;
    try_files /wallet.html =404;
  }

  location = /topup {
    return 302 /wallet;
  }

  location = /topup/ {
    return 302 /wallet;
  }

  location = /pricing {
    root /usr/share/nginx/matrix-site;
    try_files /pricing.html =404;
  }

  location = /pricing/ {
    root /usr/share/nginx/matrix-site;
    try_files /pricing.html =404;
  }

  location = /rankings {
    root /usr/share/nginx/matrix-site;
    try_files /rankings.html =404;
  }

  location = /rankings/ {
    root /usr/share/nginx/matrix-site;
    try_files /rankings.html =404;
  }

  location = /ranking {
    return 302 /rankings;
  }

  location = /ranking/ {
    return 302 /rankings;
  }

  location = /user-agreement {
    root /usr/share/nginx/matrix-site;
    try_files /legal.html =404;
  }

  location = /user-agreement/ {
    root /usr/share/nginx/matrix-site;
    try_files /legal.html =404;
  }

  location = /privacy-policy {
    root /usr/share/nginx/matrix-site;
    try_files /legal.html =404;
  }

  location = /privacy-policy/ {
    root /usr/share/nginx/matrix-site;
    try_files /legal.html =404;
  }

  location = /sign-in {
    root /usr/share/nginx/matrix-site;
    try_files /sign-in.html =404;
  }

  location = /sign-in/ {
    return 302 /sign-in;
  }

  location = /login {
    return 302 /sign-in;
  }

  location = /login/ {
    return 302 /sign-in;
  }

  location = /sign-up {
    root /usr/share/nginx/matrix-site;
    try_files /sign-up.html =404;
  }

  location = /sign-up/ {
    return 302 /sign-up;
  }

  location = /register {
    return 302 /sign-up;
  }

  location = /register/ {
    return 302 /sign-up;
  }

  location = /forgot-password {
    root /usr/share/nginx/matrix-site;
    try_files /forgot-password.html =404;
  }

  location = /forgot-password/ {
    return 302 /forgot-password;
  }

  location = /dashboard {
    return 302 /console;
  }

  location = /dashboard/ {
    return 302 /console;
  }

  location = /dashboard/overview {
    return 302 /console;
  }

  location = /dashboard/topup {
    return 302 /console/topup;
  }

  location = /dashboard/topup/ {
    return 302 /console/topup;
  }

  location ~ ^/dashboard/(token|log|subscription|personal|models|channel|redemption|setting|deployment|user|task)$ {
    return 302 /console/$1;
  }

  location /dashboard/ {
    proxy_pass http://new_api/console/;
    proxy_cache matrix_static;
    proxy_cache_valid 200 30s;
    proxy_cache_lock on;
    proxy_ignore_headers Cache-Control Expires Set-Cookie;
    proxy_hide_header Set-Cookie;
    proxy_set_header Accept-Encoding "";
    sub_filter_once on;
    sub_filter '</head>' '<script src="/matrix-assets/brand-init.js?v=2026070813"></script></head>';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    include /etc/nginx/conf.d/security-headers.inc;
    add_header X-Matrix-Cache $upstream_cache_status always;
  }

  location = /console {
    proxy_pass http://new_api;
    proxy_cache matrix_static;
    proxy_cache_valid 200 30s;
    proxy_cache_lock on;
    proxy_ignore_headers Cache-Control Expires Set-Cookie;
    proxy_hide_header Set-Cookie;
    proxy_set_header Accept-Encoding "";
    sub_filter_once on;
    sub_filter '</head>' '<script src="/matrix-assets/brand-init.js?v=2026070813"></script></head>';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    include /etc/nginx/conf.d/security-headers.inc;
    add_header X-Matrix-Cache $upstream_cache_status always;
  }

  location = /console/ {
    return 302 /console;
  }

  location /console/ {
    proxy_pass http://new_api;
    proxy_cache matrix_static;
    proxy_cache_valid 200 30s;
    proxy_cache_lock on;
    proxy_ignore_headers Cache-Control Expires Set-Cookie;
    proxy_hide_header Set-Cookie;
    proxy_set_header Accept-Encoding "";
    sub_filter_once on;
    sub_filter '</head>' '<script src="/matrix-assets/brand-init.js?v=2026070813"></script></head>';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    include /etc/nginx/conf.d/security-headers.inc;
    add_header X-Matrix-Cache $upstream_cache_status always;
  }

  location = /keys {
    return 302 /console/token;
  }

  location = /keys/ {
    return 302 /console/token;
  }

  location = /profile {
    return 302 /console/personal;
  }

  location = /profile/ {
    return 302 /console/personal;
  }

  location = /channels {
    return 302 /console/channel;
  }

  location = /channels/ {
    return 302 /console/channel;
  }

  location = /models {
    return 302 /pricing;
  }

  location = /models/metadata {
    return 302 /console/models;
  }

  location = /system-settings {
    return 302 /console/setting;
  }

  location = /system-settings/site {
    return 302 /console/setting;
  }

  location = /api/user/epay/notify {
    proxy_pass http://new_api/api/user/epay/notify;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  location = /api/subscription/epay/notify {
    proxy_pass http://new_api/api/subscription/epay/notify;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  location /v1/ {
    proxy_pass http://new_api/v1/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
    proxy_http_version 1.1;
    proxy_set_header Connection '';
    limit_req zone=gateway burst=80 nodelay;
  }

  location /api/ {
    proxy_pass http://new_api/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_http_version 1.1;
    limit_req zone=api burst=40 nodelay;
  }

  location / {
    proxy_pass http://new_api;
    proxy_set_header Accept-Encoding "";
    sub_filter_once on;
  sub_filter '</head>' '<script src="/matrix-assets/brand-init.js?v=2026070813"></script></head>';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}

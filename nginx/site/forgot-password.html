<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <title>Matrix API Forgot Password</title>
    <meta name="description" content="找回 Matrix API 账号。" />
    <link rel="icon" type="image/png" href="/matrix-assets/matrixapi-favicon.png?v=2026071421" />
    <link rel="apple-touch-icon" href="/matrix-assets/apple-touch-icon.png?v=2026071421" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="/matrix-assets/public-shell.css" />
  </head>
  <body>
    <header style="position:fixed; top:16px; left:16px; z-index:50;">
      <a class="brand auth-gate-brand" href="/" aria-label="Matrix API home" style="padding:10px 14px; border-radius:14px; background:rgba(255,255,255,.82); box-shadow:0 12px 30px rgba(15,23,42,.08); backdrop-filter:blur(14px);">
        <img src="/matrix-assets/matrixapi-logo.png?v=2026071419" alt="Matrix API" />
        <span>Matrix API算力中心</span>
      </a>
    </header>
    <a href="/sign-in" style="position:fixed; top:22px; right:16px; z-index:50; font-size:14px; font-weight:600; text-decoration:underline; text-underline-offset:4px; color:#111827;">登录</a>

    <main class="shell auth-layout" style="grid-template-columns:minmax(0,1fr); place-items:center; min-height:100vh; padding-top:88px;">
      <section class="auth-card" aria-labelledby="recovery-title" style="width:min(100%, 500px);">
        <h1 id="recovery-title" style="font-size:28px; margin-bottom:8px;">忘记密码</h1>
        <p>输入账号邮箱或用户名，MatrixAPI 将为你准备找回流程。</p>
        <form data-recovery-form>
          <label>
            邮箱或用户名
            <input name="account" type="text" autocomplete="username" required />
          </label>
          <label>
            验证邮箱
            <input name="email" type="email" autocomplete="email" placeholder="可选" />
          </label>
          <div class="tabs" style="justify-content:space-between;">
            <span class="muted">找回请求只在 MatrixAPI 域名内处理。</span>
            <a class="card-link" href="/sign-in">返回登录</a>
          </div>
          <button class="button primary" type="submit" style="width:100%;">发送找回请求</button>
          <div class="status" role="status" data-status>就绪。</div>
        </form>
        <div class="quick-links" style="margin-top:18px;">
          <a href="/user-agreement">用户协议</a>
          <a href="/privacy-policy">隐私政策</a>
          <a href="mailto:3315419516@qq.com">支持邮箱</a>
        </div>
      </section>
    </main>

    <footer class="shell">Matrix API (c) 2026 | OpenAI Compatible Gateway | Matrix API-owned gateway</footer>
    <script>
      const form = document.querySelector("[data-recovery-form]");
      const statusNode = document.querySelector("[data-status]");

      function setStatus(message, type = "") {
        statusNode.textContent = message;
        statusNode.className = `status ${type}`.trim();
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const button = form.querySelector('button[type="submit"]');
        button.disabled = true;
        setStatus("正在准备找回请求...");
        window.setTimeout(() => {
          setStatus("如果账号存在，支持团队会协助完成重置。", "ok");
          button.disabled = false;
        }, 900);
      });
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <title>MatrixAPI Sign In</title>
    <meta name="description" content="登录 MatrixAPI 并进入控制台。" />
    <link rel="icon" type="image/png" href="/matrix-assets/matrixapi-favicon.png" />
    <link rel="apple-touch-icon" href="/matrix-assets/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="/matrix-assets/public-shell.css" />
  </head>
  <body class="auth-gate-page">
    <header>
      <a class="auth-gate-brand" href="/" aria-label="MatrixAPI home">
        <img src="/matrix-assets/matrixapi-logo.png" alt="MatrixAPI" />
        <span>MatrixAPI算力中心</span>
      </a>
    </header>
    <a class="auth-gate-link" href="/sign-up">注册</a>

    <main class="auth-gate-main">
      <section class="auth-gate-card" aria-labelledby="signin-title">
        <h1 id="signin-title">登录</h1>
        <p>没有账号？ <a href="/sign-up" style="text-decoration:underline; text-underline-offset:4px;">注册</a></p>
        <form data-auth-form>
          <button class="button" type="button" disabled style="width:100%; justify-content:center;">使用 Passkey 登录</button>
          <label>
            用户名或电子邮件
            <input name="username" type="text" autocomplete="username" placeholder="输入您的用户名或电子邮件" required />
          </label>
          <label>
            密码
            <div style="display:flex; gap:10px; align-items:center;">
              <input name="password" type="password" autocomplete="current-password" placeholder="输入密码" required style="flex:1;" />
              <button class="icon-button" type="button" data-toggle-password aria-label="Toggle password">
                <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>
          </label>
          <label class="agreement-box">
            <input name="agree" type="checkbox" required />
            <span>我已阅读并同意 用户协议 和 隐私政策。</span>
          </label>
          <div class="tabs" style="justify-content:space-between;">
            <a class="card-link" href="/forgot-password">忘记密码?</a>
            <a class="card-link" href="/sign-up">创建账号</a>
          </div>
          <button class="button primary" type="submit" style="width:100%;">登录</button>
          <div class="status" role="status" data-status>就绪。</div>
        </form>
        <div class="quick-links" style="margin-top:18px;">
          <a href="/user-agreement">用户协议</a>
          <a href="/privacy-policy">隐私政策</a>
        </div>
      </section>
    </main>

    <footer class="shell">MatrixAPI (c) 2026 | OpenAI Compatible Gateway | MatrixAPI-owned gateway</footer>

    <script>
      const form = document.querySelector("[data-auth-form]");
      const statusNode = document.querySelector("[data-status]");

      function setStatus(message, type = "") {
        statusNode.textContent = message;
        statusNode.className = `status ${type}`.trim();
      }

      function normalizeAuthError(message) {
        if (/username|password|incorrect|banned/i.test(message || "")) {
          return "用户名或密码错误，或账号已被禁用。";
        }
        if (/network|fetch/i.test(message || "")) {
          return "网络错误，请稍后重试。";
        }
        return message || "登录失败。";
      }

      const togglePassword = document.querySelector("[data-toggle-password]");
      if (togglePassword) {
        togglePassword.addEventListener("click", () => {
          const input = form.password;
          input.type = input.type === "password" ? "text" : "password";
        });
      }

      function saveSession(user) {
        if (!user || typeof user !== "object") return;
        if (user.id != null) localStorage.setItem("uid", String(user.id));
        localStorage.setItem("user", JSON.stringify(user));
        localStorage.setItem("locale", "zh");
        localStorage.setItem("matrix-lang", "zh");
        sessionStorage.removeItem("matrix-admin-login-redirected");
      }

      async function signIn(event) {
        event.preventDefault();
        const button = form.querySelector('button[type="submit"]');
        const username = form.username.value.trim();
        const password = form.password.value;
        if (!form.agree.checked) {
          setStatus("请先同意用户协议和隐私政策。", "error");
          return;
        }
        button.disabled = true;
          setStatus("正在登录...");
        try {
          const response = await fetch("/api/user/login", {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });
          const json = await response.json().catch(() => null);
          if (!response.ok || !json?.success || !json?.data) {
            throw new Error(json?.message || "登录失败。");
          }
          saveSession(json.data);
          setStatus("登录成功，正在进入控制台...", "ok");
          window.location.href = "/console";
        } catch (error) {
          setStatus(normalizeAuthError(error.message), "error");
        } finally {
          button.disabled = false;
        }
      }

      form.addEventListener("submit", signIn);
    </script>
  </body>
</html>
